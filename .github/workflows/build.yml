name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli-macos:
    name: sage (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p coding-agent --release --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: sage-macos-arm64
          path: target/aarch64-apple-darwin/release/sage

  build-cli-macos-intel:
    name: sage (macOS x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p coding-agent --release --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: sage-macos-x86_64
          path: target/x86_64-apple-darwin/release/sage

  build-cli-linux:
    name: sage (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build -p coding-agent --release --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: sage-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/sage

  build-cli-windows:
    name: sage (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p coding-agent --release --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: sage-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/sage.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-cli-macos
      - build-cli-macos-intel
      - build-cli-linux
      - build-cli-windows
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Rename artifacts and generate SHA256 sums
        run: |
          set -euo pipefail
          mv artifacts/sage-macos-arm64/sage       artifacts/sage-macos-arm64
          mv artifacts/sage-macos-x86_64/sage      artifacts/sage-macos-x86_64
          mv artifacts/sage-linux-x86_64/sage      artifacts/sage-linux-x86_64
          mv artifacts/sage-windows-x86_64/sage.exe artifacts/sage-windows-x86_64.exe
          cd artifacts
          for f in sage-macos-arm64 sage-macos-x86_64 sage-linux-x86_64 \
                   sage-windows-x86_64.exe; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sage ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/sage-macos-arm64
            artifacts/sage-macos-arm64.sha256
            artifacts/sage-macos-x86_64
            artifacts/sage-macos-x86_64.sha256
            artifacts/sage-linux-x86_64
            artifacts/sage-linux-x86_64.sha256
            artifacts/sage-windows-x86_64.exe
            artifacts/sage-windows-x86_64.exe.sha256
