name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli-macos:
    name: sage-cli (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p sage-cli --release --target aarch64-apple-darwin

      - name: Sign (HVF entitlement)
        run: |
          codesign --sign - \
            --entitlements entitlements/sage.entitlements \
            --force \
            target/aarch64-apple-darwin/release/sage

      - uses: actions/upload-artifact@v4
        with:
          name: sage-macos-arm64
          path: target/aarch64-apple-darwin/release/sage

  build-cli-linux:
    name: sage-cli (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build -p sage-cli --release --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: sage-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/sage

  build-guest:
    name: sage-guest (aarch64-linux-musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build -p sage-guest --release --target aarch64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: sage-guest-aarch64
          path: target/aarch64-unknown-linux-musl/release/sage-guest

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-cli-macos, build-cli-linux, build-guest]
    # Only run when triggered by a tag push (not workflow_dispatch)
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Rename artifacts for release
        run: |
          mv artifacts/sage-macos-arm64/sage   artifacts/sage-macos-arm64
          mv artifacts/sage-linux-x86_64/sage  artifacts/sage-linux-x86_64
          mv artifacts/sage-guest-aarch64/sage-guest  artifacts/sage-guest-aarch64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sage ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/sage-macos-arm64
            artifacts/sage-linux-x86_64
            artifacts/sage-guest-aarch64
