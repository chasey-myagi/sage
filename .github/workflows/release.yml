name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - name: darwin-x86_64
            os: macos-14
            target: x86_64-apple-darwin
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p coding-agent

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARTIFACT="sage-${VERSION}-${{ matrix.name }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sage" dist/sage
          cd dist
          tar czf "../${ARTIFACT}.tar.gz" sage
          echo "ARTIFACT=${ARTIFACT}" >> $GITHUB_ENV
          if command -v sha256sum &>/dev/null; then
            sha256sum "../${ARTIFACT}.tar.gz" | awk '{print $1}'
          else
            shasum -a 256 "../${ARTIFACT}.tar.gz" | awk '{print $1}'
          fi > "../${ARTIFACT}.sha256"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}.tar.gz
            ${{ env.ARTIFACT }}.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          VERSION_NUM=${VERSION#v}

          SHA_DARWIN_ARM64=$(cat  artifacts/sage-${VERSION}-darwin-arm64.sha256)
          SHA_DARWIN_X86_64=$(cat artifacts/sage-${VERSION}-darwin-x86_64.sha256)
          SHA_LINUX_X86_64=$(cat  artifacts/sage-${VERSION}-linux-x86_64.sha256)
          SHA_LINUX_ARM64=$(cat   artifacts/sage-${VERSION}-linux-arm64.sha256)

          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/chasey-myagi/homebrew-tap.git" \
            tap

          cd tap

          # Replace all placeholders in-place
          sed -i \
            -e "s|@@VERSION@@|${VERSION_NUM}|g" \
            -e "s|@@VERSION_TAG@@|${VERSION}|g" \
            -e "s|@@SHA256_DARWIN_ARM64@@|${SHA_DARWIN_ARM64}|g" \
            -e "s|@@SHA256_DARWIN_X86_64@@|${SHA_DARWIN_X86_64}|g" \
            -e "s|@@SHA256_LINUX_X86_64@@|${SHA_LINUX_X86_64}|g" \
            -e "s|@@SHA256_LINUX_ARM64@@|${SHA_LINUX_ARM64}|g" \
            Formula/sage.rb

          # If it's not the first release, update existing version/sha fields
          sed -i \
            -e "s|version \"[0-9.]*\"|version \"${VERSION_NUM}\"|g" \
            -e "s|/releases/download/v[0-9.]*/sage-v[0-9.]*-darwin-arm64|/releases/download/${VERSION}/sage-${VERSION}-darwin-arm64|g" \
            -e "s|/releases/download/v[0-9.]*/sage-v[0-9.]*-darwin-x86_64|/releases/download/${VERSION}/sage-${VERSION}-darwin-x86_64|g" \
            -e "s|/releases/download/v[0-9.]*/sage-v[0-9.]*-linux-x86_64|/releases/download/${VERSION}/sage-${VERSION}-linux-x86_64|g" \
            -e "s|/releases/download/v[0-9.]*/sage-v[0-9.]*-linux-arm64|/releases/download/${VERSION}/sage-${VERSION}-linux-arm64|g" \
            Formula/sage.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/sage.rb
          git diff --cached --quiet || git commit -m "chore: bump sage to ${VERSION}"
          git push
