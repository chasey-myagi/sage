<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --fg:#1c1917; --fg2:#44403c; --fg3:#78716c;
  --c-gray:#78716c;  --c-gray-f:rgba(120,113,108,0.08);
  --c-idle:#10b981;  --c-idle-f:rgba(16,185,129,0.08);
  --c-proc:#6366f1;  --c-proc-f:rgba(99,102,241,0.08);
  --c-comp:#d97706;  --c-comp-f:rgba(217,119,6,0.08);
  --c-shut:#78716c;  --c-shut-f:rgba(120,113,108,0.05);
}
[data-theme="dark"] {
  --fg:#e7e5e4; --fg2:#d4cfc9; --fg3:#a8a29e;
  --c-idle:#34d399; --c-idle-f:rgba(52,211,153,0.12);
  --c-proc:#818cf8; --c-proc-f:rgba(129,140,248,0.12);
  --c-comp:#fbbf24; --c-comp-f:rgba(251,191,36,0.1);
}
html,body { margin:0; padding:0; background:transparent; overflow:hidden; }
@media (prefers-reduced-motion:reduce) { * { animation-duration:0.01ms !important; } }
</style>
</head>
<body>
<svg viewBox="0 0 830 230" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;">
  <defs>
    <marker id="a-gray" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="var(--c-gray)"/>
    </marker>
    <marker id="a-idle" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="var(--c-idle)"/>
    </marker>
    <marker id="a-proc" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="var(--c-proc)"/>
    </marker>
    <marker id="a-comp" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="var(--c-comp)"/>
    </marker>
  </defs>

  <!-- === MAIN ROW OF STATES (y=78..138) === -->

  <!-- STARTUP -->
  <rect x="10" y="78" width="104" height="58" rx="10"
        fill="var(--c-gray-f)" stroke="var(--c-gray)" stroke-width="1.5"/>
  <text x="62" y="104" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="11" font-weight="700" fill="var(--c-gray)">STARTUP</text>
  <text x="62" y="122" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="10" fill="var(--fg3)">一次性初始化</text>

  <!-- STARTUP → IDLE -->
  <line x1="114" y1="107" x2="178" y2="107"
        stroke="var(--c-gray)" stroke-width="1.5" marker-end="url(#a-gray)"/>

  <!-- IDLE -->
  <rect x="182" y="78" width="104" height="58" rx="10"
        fill="var(--c-idle-f)" stroke="var(--c-idle)" stroke-width="1.5"/>
  <!-- Idle glow ring -->
  <rect x="182" y="78" width="104" height="58" rx="10"
        fill="none" stroke="var(--c-idle)" stroke-width="3.5" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <text x="234" y="104" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="11" font-weight="700" fill="var(--c-idle)">IDLE</text>
  <text x="234" y="122" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="10" fill="var(--fg3)">等待消息</text>

  <!-- IDLE → PROCESSING -->
  <line x1="286" y1="107" x2="358" y2="107"
        stroke="var(--c-idle)" stroke-width="1.5" marker-end="url(#a-idle)"/>
  <text x="322" y="101" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9.5" fill="var(--fg3)">收到消息</text>

  <!-- PROCESSING -->
  <rect x="362" y="78" width="124" height="58" rx="10"
        fill="var(--c-proc-f)" stroke="var(--c-proc)" stroke-width="1.5"/>
  <text x="424" y="104" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="11" font-weight="700" fill="var(--c-proc)">PROCESSING</text>
  <text x="424" y="122" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="10" fill="var(--fg3)">执行 AgentLoop</text>
  <!-- Processing pulse dot -->
  <circle cx="474" cy="86" r="4.5" fill="var(--c-proc)">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- PROCESSING → COMPACTING -->
  <line x1="486" y1="107" x2="556" y2="107"
        stroke="var(--c-comp)" stroke-width="1.5" marker-end="url(#a-comp)"/>
  <text x="521" y="101" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9.5" fill="var(--fg3)">context ≥ 75%</text>

  <!-- COMPACTING -->
  <rect x="560" y="78" width="124" height="58" rx="10"
        fill="var(--c-comp-f)" stroke="var(--c-comp)" stroke-width="1.5"/>
  <text x="622" y="104" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="11" font-weight="700" fill="var(--c-comp)">COMPACTING</text>
  <text x="622" y="122" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="10" fill="var(--fg3)">上下文压缩</text>

  <!-- === RETURN ARCS === -->

  <!-- PROCESSING → IDLE (arc below, dashed) -->
  <path d="M 424,136 C 424,174 234,174 234,136"
        fill="none" stroke="var(--c-proc)" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#a-proc)"/>
  <text x="329" y="190" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9.5" fill="var(--fg3)">完成 · 返回 IDLE</text>

  <!-- COMPACTING → IDLE (arc above) -->
  <path d="M 622,78 C 622,36 234,36 234,78"
        fill="none" stroke="var(--c-comp)" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#a-idle)"/>
  <text x="428" y="28" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9.5" fill="var(--fg3)">注入 Memory → 重置 context → 返回 IDLE</text>

  <!-- === SHUTDOWN EXIT === -->

  <!-- IDLE → SHUTDOWN (downward dashed) -->
  <line x1="234" y1="136" x2="234" y2="172"
        stroke="var(--c-gray)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-gray)"/>
  <text x="246" y="159" font-family="system-ui,sans-serif" font-size="9.5" fill="var(--fg3)">/stop</text>

  <!-- SHUTDOWN box -->
  <rect x="182" y="175" width="104" height="46" rx="10"
        fill="var(--c-shut-f)" stroke="var(--c-gray)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="234" y="197" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="11" font-weight="700" fill="var(--c-gray)">SHUTDOWN</text>
  <text x="234" y="212" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="10" fill="var(--fg3)">SessionEnd hook</text>

</svg>
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.theme) document.documentElement.dataset.theme = e.data.theme;
});
if (window.matchMedia('(prefers-color-scheme: dark)').matches)
  document.documentElement.dataset.theme = 'dark';
</script>
</body>
</html>
